<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'" />
    <title>WhatsApp Bulk Sender</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <h1>Bulk WhatsApp</h1>
        <p class="subtitle">Local-only · Excel + template · Internal use</p>
      </header>

      <section class="card">
        <h2>Connection</h2>
        <div class="row">
          <button type="button" id="btnConnect" class="btn primary">Connect &amp; show QR</button>
          <button type="button" id="btnDisconnect" class="btn" disabled>Disconnect</button>
        </div>
        <p id="connStatus" class="status muted">Not connected</p>
        <div id="qrWrap" class="qr-wrap hidden">
          <p class="hint">Scan with WhatsApp on your phone (Linked devices)</p>
          <img id="qrImg" alt="WhatsApp QR code" />
        </div>
      </section>

      <section class="card">
        <h2>Contacts (Excel)</h2>
        <p class="hint">Columns: <code>number</code> (with country code, e.g. 2010…), <code>name</code></p>
        <input type="file" id="fileInput" accept=".xlsx,.xls" />
        <p id="fileStatus" class="status muted">No file loaded</p>
      </section>

      <section class="card">
        <h2>Message</h2>
        <label for="template">Template</label>
        <textarea id="template" rows="4" placeholder="Hello {name}, …">Hello {name}</textarea>
        <label for="delay">Delay between messages (seconds)</label>
        <input type="number" id="delay" min="0" step="0.5" value="3" />
      </section>

      <section class="card">
        <h2>Send</h2>
        <div class="row">
          <button type="button" id="btnSend" class="btn primary" disabled>Send to all</button>
          <button type="button" id="btnCancel" class="btn danger" disabled>Cancel</button>
        </div>
        <div class="stats">
          <div class="stat">
            <div class="stat-label">Elapsed</div>
            <div class="stat-value" id="elapsed">00:00</div>
          </div>
          <div class="stat">
            <div class="stat-label">Sent</div>
            <div class="stat-value" id="sentCount">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">Failed</div>
            <div class="stat-value" id="failedCount">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">Total</div>
            <div class="stat-value" id="totalCount">0</div>
          </div>
        </div>
        <div class="progress hidden" id="progressWrap">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <p id="sendStatus" class="status muted"></p>
        <div class="log-wrap">
          <div class="log-header">
            <span>Send log</span>
            <button type="button" class="btn small" id="btnClearLog">Clear</button>
          </div>
          <div id="sendLog" class="send-log" aria-label="Send log"></div>
        </div>
      </section>
    </div>
    <script src="renderer.js"></script>
  </body>
</html>
